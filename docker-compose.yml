services:
  dlv-sim:
    build: .
    mem_limit: 8g
    # Mount at /dlv-sim/data so the binary's hardcoded paths
    # ("../dlv-sim/data/...") resolve from the WORKDIR /app.
    volumes:
      - ../dlv-sim/data:/dlv-sim/data:ro
      - ./output:/app/output
    environment:
      - RUST_BACKTRACE=0
      - BF_POOL=${BF_POOL:-CBBTC_USDC_BASE}
      - BF_START_DATE=${BF_START_DATE:-2025-09-09}
      - BF_END_DATE=${BF_END_DATE:-2026-03-06}
      - LOOKUP_PERIOD=${LOOKUP_PERIOD:-5}
      - ARB_STRATEGY=${ARB_STRATEGY:-true}
      - TARGET_CR_PCT=${TARGET_CR_PCT:-200}
      - IS_REGULATE_DEBT=${IS_REGULATE_DEBT:-true}
      - ALM_ONLY=${ALM_ONLY:-false}
      - ARB_MODE=${ARB_MODE:-close_gap}
      - ACTIVE_REBALANCE_RATIO_DEVIATION_BPS=${ACTIVE_REBALANCE_RATIO_DEVIATION_BPS:-100}

  # Parity preset: KATANA_5BP arb-mode (LevAMM + slow recenter + dynamic width),
  # 2-year window. All env vars read from scripts/katana-5bp-2y.docker.env so the
  # ~3.5 KB of BF_*_JSON survives shell delivery quirks.
  # Usage:
  #   docker compose build
  #   docker compose run --rm katana-5bp-2y
  # Override the end date for a shorter window:
  #   docker compose run --rm -e BF_END_DATE=2024-10-21 katana-5bp-2y
  katana-5bp-2y:
    build: .
    mem_limit: 8g
    # Mount at /dlv-sim/data so the binary's hardcoded paths
    # ("../dlv-sim/data/...") resolve from the WORKDIR /app.
    volumes:
      - ../dlv-sim/data:/dlv-sim/data:ro
      - ./output:/app/output
    env_file:
      - scripts/katana-5bp-2y.docker.env
